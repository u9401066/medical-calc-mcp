# Pre-commit configuration for Medical Calculator MCP Server
# Install env: uv sync --extra dev --group dev
# Install hooks: .\\scripts\\install_hooks.ps1
# Run all: .\\.venv\\Scripts\\python.exe -m pre_commit run --all-files

default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  # Ruff - Fast Python linter (replaces flake8, isort, pyupgrade, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.1
    hooks:
      # Linter
      - id: ruff
        args: [--fix, --select, "E,F,I,W,UP", --ignore, "UP045"]
      # Formatter (optional, replaces black)
      - id: ruff-format

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Check for common security issues
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: project-consistency
        name: project consistency
        entry: python scripts/check_project_consistency.py
        language: system
        pass_filenames: false
      - id: project-consistency-strict
        name: project consistency strict
        entry: python scripts/check_project_consistency.py --check-tests
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy
        name: mypy
        entry: python -m mypy --no-incremental src tests
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest
        entry: python -m pytest tests -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: commit-message
        name: commit message
        entry: python scripts/validate_commit_message.py
        language: system
        stages: [commit-msg]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: monthly
  skip: []
  submodules: false
