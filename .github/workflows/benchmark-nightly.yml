name: Benchmark Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Build benchmark profile matrix
        id: matrix
        run: |
          MATRIX_JSON=$(python scripts/benchmark_profiles_matrix.py --manifest data/agent_decision_bench/profiles/manifest.json)
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  benchmark-matrix:
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Run benchmark profile
        run: |
          uv run python scripts/benchmark_run_profile.py \
            --manifest data/agent_decision_bench/profiles/manifest.json \
            --profile-id ${{ matrix.profile.profile_id }} \
            --output-dir benchmark-output

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.profile.profile_id }}
          path: benchmark-output/
          if-no-files-found: error

  aggregate-reporting:
    runs-on: ubuntu-latest
    needs: benchmark-matrix

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: benchmark-artifacts
          pattern: benchmark-*
          merge-multiple: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Build leaderboard and time series
        run: |
          uv run python scripts/benchmark_build_reports.py \
            --inputs benchmark-artifacts \
            --leaderboard-md benchmark-leaderboard.md \
            --time-series-json benchmark-time-series.json \
            --report-index-json benchmark-report-index.json

      - name: Publish leaderboard to job summary
        run: cat benchmark-leaderboard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reporting artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reporting
          path: |
            benchmark-leaderboard.md
            benchmark-time-series.json
            benchmark-report-index.json
          if-no-files-found: error